<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MadRabbit Wiki - Web Security Vulnerability Lab</title>
  <meta name="description" content="MadRabbit Web Security Vulnerability Lab Platform - Complete Wiki Documentation">
  <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple-dark.css">
  <style>
    :root {
      --theme-color: #00f3ff;
      --sidebar-nav-link-color--active: #00f3ff;
      --sidebar-nav-link-border-color--active: #00f3ff;
      --link-color: #00f3ff;
      --link-color--hover: #ff006e;
      --base-background-color: #0d1117;
      --sidebar-background: #0d1117;
      --sidebar-border-color: #1a1a2e;
    }
    .sidebar-nav li > a { white-space: normal; }
    .markdown-section { max-width: 900px; }
    .sidebar-toggle { background-color: #0d1117; }

    /* Language Switcher */
    .lang-switcher {
      padding: 14px 20px;
      border-bottom: 1px solid #1a1a2e;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .lang-switcher button {
      padding: 5px 14px;
      border: 1px solid #30363d;
      border-radius: 4px;
      background: transparent;
      color: #8b949e;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .lang-switcher button:hover {
      border-color: #00f3ff;
      color: #00f3ff;
    }
    .lang-switcher button.active {
      background: #00f3ff;
      color: #0d1117;
      border-color: #00f3ff;
      font-weight: 600;
    }
    .lang-switcher .divider {
      color: #30363d;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div id="app">Loading...</div>
  <script>
    var currentLang = localStorage.getItem('madrabbit-wiki-lang') || 'en';

    window.$docsify = {
      name: 'MadRabbit Wiki',
      nameLink: '/',
      repo: 'https://github.com/zhuifengshaonianhanlu/MadRabbit',
      loadSidebar: true,
      subMaxLevel: 2,
      auto2top: true,
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: 'Search...',
        noData: 'No Results',
        depth: 3
      },
      plugins: [
        function(hook, vm) {
          // Inject language switcher into sidebar
          hook.mounted(function() {
            var sidebar = document.querySelector('.sidebar-nav');
            if (!sidebar) return;

            var switcher = document.createElement('div');
            switcher.className = 'lang-switcher';
            switcher.innerHTML =
              '<button data-lang="en" class="' + (currentLang === 'en' ? 'active' : '') + '">EN</button>' +
              '<span class="divider">|</span>' +
              '<button data-lang="zh" class="' + (currentLang === 'zh' ? 'active' : '') + '">\u4E2D\u6587</button>';

            switcher.addEventListener('click', function(e) {
              var btn = e.target.closest('button[data-lang]');
              if (!btn) return;
              var lang = btn.getAttribute('data-lang');
              if (lang === currentLang) return;
              currentLang = lang;
              localStorage.setItem('madrabbit-wiki-lang', lang);
              switcher.querySelectorAll('button').forEach(function(b) {
                b.classList.toggle('active', b.getAttribute('data-lang') === lang);
              });
              applyLang(lang);
              // Navigate to same page in new language
              var activeLink = sidebar.querySelector('.sidebar-nav a.active');
              if (activeLink) {
                var href = activeLink.getAttribute('href');
                if (href) vm.route.to(href);
              }
            });

            sidebar.insertBefore(switcher, sidebar.firstChild);
            applyLang(currentLang);
          });

          // Re-apply language after sidebar re-renders
          hook.doneEach(function() {
            applyLang(currentLang);
          });

          function applyLang(lang) {
            var sidebar = document.querySelector('.sidebar-nav');
            if (!sidebar) return;

            var links = sidebar.querySelectorAll('a[href]');
            links.forEach(function(link) {
              var href = link.getAttribute('href');
              if (!href) return;
              if (lang === 'zh') {
                // English -> Chinese: remove _en before .md
                if (href.indexOf('_en.md') !== -1) {
                  link.setAttribute('href', href.replace(/_en\.md/g, '.md'));
                }
              } else {
                // Chinese -> English: ensure _en before .md
                if (href.match(/[^_]\.md$/) && href.indexOf('_en.md') === -1) {
                  link.setAttribute('href', href.replace(/\.md$/, '_en.md'));
                }
              }
            });
          }
        }
      ]
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-java.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-sql.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-xml-doc.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-http.min.js"></script>
</body>
</html>
