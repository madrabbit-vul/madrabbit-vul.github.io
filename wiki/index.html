<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MadRabbit Wiki - Web Security Vulnerability Lab</title>
  <meta name="description" content="MadRabbit Web Security Vulnerability Lab Platform - Complete Wiki Documentation">
  <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple-dark.css">
  <style>
    :root {
      --theme-color: #00f3ff;
      --sidebar-nav-link-color--active: #00f3ff;
      --sidebar-nav-link-border-color--active: #00f3ff;
      --link-color: #00f3ff;
      --link-color--hover: #ff006e;
      --base-background-color: #0d1117;
      --sidebar-background: #0d1117;
      --sidebar-border-color: #1a1a2e;
    }
    .sidebar-nav li > a { white-space: normal; }
    .markdown-section { max-width: 900px; }
    .sidebar-toggle { background-color: #0d1117; }

    /* Fixed Language Switcher - top right corner */
    .wiki-lang-switch {
      position: fixed;
      top: 12px;
      right: 60px;
      z-index: 9999;
      display: flex;
      align-items: center;
      gap: 4px;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 4px 6px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    .wiki-lang-switch button {
      padding: 4px 12px;
      border: none;
      border-radius: 4px;
      background: transparent;
      color: #8b949e;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
      line-height: 1.4;
    }
    .wiki-lang-switch button:hover {
      color: #00f3ff;
    }
    .wiki-lang-switch button.active {
      background: #00f3ff;
      color: #0d1117;
      font-weight: 600;
    }
    .wiki-lang-switch .sep {
      color: #30363d;
      font-size: 11px;
      user-select: none;
    }
  </style>
</head>
<body>
  <!-- Fixed language switcher -->
  <div class="wiki-lang-switch" id="wikiLangSwitch">
    <button data-lang="en" class="active">EN</button>
    <span class="sep">|</span>
    <button data-lang="zh">中文</button>
  </div>

  <div id="app">Loading...</div>
  <script>
    var currentLang = localStorage.getItem('madrabbit-wiki-lang') || 'en';

    // Set initial button state
    document.addEventListener('DOMContentLoaded', function() {
      var btns = document.querySelectorAll('#wikiLangSwitch button');
      btns.forEach(function(b) {
        b.classList.toggle('active', b.getAttribute('data-lang') === currentLang);
      });
    });

    function applyLang(lang) {
      var sidebar = document.querySelector('.sidebar-nav');
      if (!sidebar) return;
      var links = sidebar.querySelectorAll('a[href]');
      links.forEach(function(link) {
        var href = link.getAttribute('href');
        if (!href || href === '#') return;
        if (lang === 'zh') {
          if (href.indexOf('_en.md') !== -1) {
            link.setAttribute('href', href.replace(/_en\.md/g, '.md'));
          }
        } else {
          if (href.indexOf('_en.md') === -1 && href.match(/\.md$/)) {
            link.setAttribute('href', href.replace(/\.md$/, '_en.md'));
          }
        }
      });
    }

    // Language switch click handler
    document.getElementById('wikiLangSwitch').addEventListener('click', function(e) {
      var btn = e.target.closest('button[data-lang]');
      if (!btn) return;
      var lang = btn.getAttribute('data-lang');
      if (lang === currentLang) return;
      currentLang = lang;
      localStorage.setItem('madrabbit-wiki-lang', lang);
      this.querySelectorAll('button').forEach(function(b) {
        b.classList.toggle('active', b.getAttribute('data-lang') === lang);
      });
      applyLang(lang);
      // Reload current page in new language
      var activeLink = document.querySelector('.sidebar-nav a.active');
      if (activeLink) {
        var href = activeLink.getAttribute('href');
        if (href && window.__docsifyVM) window.__docsifyVM.route.to(href);
      }
    });

    window.$docsify = {
      name: 'MadRabbit Wiki',
      nameLink: '/',
      repo: 'https://github.com/zhuifengshaonianhanlu/MadRabbit',
      loadSidebar: true,
      subMaxLevel: 2,
      auto2top: true,
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: 'Search...',
        noData: 'No Results',
        depth: 3
      },
      plugins: [
        function(hook, vm) {
          window.__docsifyVM = vm;
          hook.doneEach(function() {
            applyLang(currentLang);
          });
        }
      ]
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-java.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-sql.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-xml-doc.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-http.min.js"></script>
</body>
</html>
